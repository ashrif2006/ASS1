        <title>Applied Jobs</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
 
  <body>
    <!-- GUEST NAVBAR VERSION -->

      <nav>

          <a href="jobs.html" >Jobs</a>

    <!-- LOGGED-IN NAVBAR VERSION -->

      <nav>

        <div>
          <a href="index.html">Home</a>
          <a href="jobs.html">Jobs</a>

    <h1>My Applied Jobs</h1>
    <p>Here are the jobs you have applied for.</p>
    <div class="jobs-container"></div>


    <footer style="position: absolute; bottom: 0;left: 0 ; width: 100%; text-align: center;">
      <p>© 2026 JobFinder. All rights reserved.</p>
    </footer>
    <script>
    document.addEventListener("DOMContentLoaded", function () {

      const jobs = [
        {
          title: "Frontend Developer",
          company: "Google",
          location: "Remote",
          salary: "$120K",
          date: "10 Jan 2026",
          status: "pending"
        },
        {
          title: "Backend Engineer",
          company: "Amazon",
          location: "Cairo",
          salary: "$150K",
          date: "8 Jan 2026",
          status: "accepted"
        },
        {
          title: "Full Stack Developer",
          company: "Microsoft",
          location: "Remote",
          salary: "$140K",
          date: "5 Jan 2026",
          status: "pending"
        },
        {
          title: "UI/UX Designer",
          company: "Adobe",
          location: "Dubai",
          salary: "$110K",
          date: "2 Jan 2026",
          status: "rejected"
        },
        {
          title: "DevOps Engineer",
          company: "Netflix",
          location: "Remote",
          salary: "$160K",
          date: "1 Jan 2026",
          status: "accepted"
        }
      ];

      const container = document.querySelector(".jobs-container");

      jobs.forEach(job => {

        const card = document.createElement("div");
        card.classList.add("job-card");

        card.innerHTML = `
          <div class="job-title">${job.title}</div>
          <div class="company">${job.company}</div>

          <div class="info">📍 ${job.location}</div>
          <div class="info">💰 ${job.salary}</div>
          <div class="info">📅 Applied: ${job.date}</div>

          <div class="status ${job.status}">
            ${job.status}
          </div>

          <button>View</button>
        `;

        container.appendChild(card);
      });

    });
  </script>
  </body>
</html>
