<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Job</title>

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/style.css" />
    <link rel="stylesheet" href="CSS/edit.css" />
  </head>

  <body>
    <!-- GUEST NAVBAR VERSION -->
    <header class="guest-navbar">
      <nav>
        <div class="nav-brand">JobFinder</div>
        <div>
          <a href="jobs.html">Jobs</a>
          <a href="applied-job.html">Applied Jobs</a>
          <a href="post-job.html">Post Job</a>
          <a href="edit-job.html" class="active">Edit Job</a>
          <a href="/index.html">LogOut</a>
        </div>
      </nav>
    </header>

    <!-- LOGGED-IN NAVBAR VERSION -->
    <header class="logged-in-navbar hidden">
      <nav>
        <div class="nav-brand">JobFinder</div>
        <div>
          <a href="index.html">Home</a>
          <a href="jobs.html">Jobs</a>
          <a href="job-details.html">Job Details</a>
          <a href="applied-job.html">Applied Jobs</a>
          <a href="post-job.html">Post Job</a>
          <a href="edit-job.html" class="active">Edit Job</a>
          <a href="login.html">Logout</a>
        </div>
      </nav>
    </header>

    <main class="container">
      <div class="page-header">
        <h1>Edit Job Posting</h1>
        <p>Modify the details below to update the job listing information.</p>
      </div>

      <div class="form-wrapper">
        <form id="jobForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="jobId">Job ID</label>
              <input
                type="text"
                id="jobId"
                placeholder="Job ID "
              />
            </div>

            <div class="form-group">
              <label for="jobTitle">Job Title</label>
              <input
                type="text"
                id="jobTitle"
                required
                placeholder="e.g. Senior Developer"
              />
            </div>

            <div class="form-group">
              <label for="salary">Salary ($)</label>
              <input
                type="number"
                id="salary"
                min="0"
                required
                placeholder="e.g. 120000"
              />
            </div>

            <div class="form-group">
              <label for="company">Company Name</label>
              <input
                type="text"
                id="company"
                required
                placeholder="Google, Amazon..."
              />
            </div>

            <div class="form-group">
              <label for="status">Job Status</label>
              <select id="status">
                  <option value="">Select Status</option>
                  <option>Full Time</option>
                  <option>Part Time</option>
                  <option>Remote</option>
                  <option>Internship</option>
                  <option>Contract</option>
              </select>
            </div>
          </div>

          <div class="form-group full-width">
            <label for="description">Job Description</label>
            <textarea
              id="description"
              rows="6"
              required
              placeholder="Describe the responsibilities and requirements..."
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-save" id="updateBtn">Update Job</button>
            <button type="button" id="deleteBtn" class="btn-delete">
              Delete Posting
            </button>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 JobFinder. All rights reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="js/edit-job.js"></script>
  </body>
</html>
