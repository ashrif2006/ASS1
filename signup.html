<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - JobFinder</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>

  <body>
    <header>
      <nav>
        <div class="nav-brand">JobFinder</div>
        <div>
          <a href="index.html">Home</a>
          <a href="login.html">Login</a>
          <a href="signup.html" class="active">Sign Up</a>
          <a href="jobs.html">Jobs</a>
        </div>
      </nav>
    </header>

    <main>
      <div class="auth-form">
        <h2>Create Your Account</h2>

        <form id="signupForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required minlength="3" placeholder="John Doe" />
            <div id="nameError" class="error-message hidden"></div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com" />
            <div id="emailError" class="error-message hidden"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters" />
            <div id="passwordError" class="error-message hidden"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your password" />
            <div id="confirmPasswordError" class="error-message hidden"></div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number (Optional)</label>
            <input type="tel" id="phone" name="phone" placeholder="123-456-7890" pattern="[0-9]{10,}" />
            <div id="phoneError" class="error-message hidden"></div>
          </div>

          <div class="form-group">
            <label for="cv">Upload CV (Optional)</label>
            <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" />
            <div id="cvError" class="error-message hidden"></div>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
        </form>

        <div class="auth-links">
          <p>Already have an account? <a href="login.html">Login here</a></p>
          <p><a href="index.html">← Back to Home</a></p>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 JobFinder. All rights reserved.</p>
    </footer>

    <script src="JS/auth.js"></script>
  </body>
</html>
