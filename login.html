<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - JobFinder</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>

  <body>
    <header>
      <nav>
        <div class="nav-brand">JobFinder</div>
        <div>
          <a href="index.html">Home</a>
          <a href="login.html" class="active">Login</a>
          <a href="signup.html">Sign Up</a>
          <a href="jobs.html">Jobs</a>
        </div>
      </nav>
    </header>

    <main>
      <div class="auth-form">
        <h2>Login to Your Account</h2>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email" />
            <div id="emailError" class="error-message hidden"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="Enter your password" />
            <div id="passwordError" class="error-message hidden"></div>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <div class="auth-links">
          <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
          <p><a href="index.html">← Back to Home</a></p>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 JobFinder. All rights reserved.</p>
    </footer>

    <script src="JS/auth.js"></script>
  </body>
</html>
