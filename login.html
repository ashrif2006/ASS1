<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
  </head>

  <body>
    <h2>Login</h2>

    <form>
      <label>Email</label>
      <input type="email" required />
      <br />

      <label>Password</label>
      <input type="password" required minlength="6" />
      <br />

      <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
  </body>
</html>
